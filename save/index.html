<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>khj的匿名聊天</title>
<meta http-equiv="Content-Style-Type" content="text/css" />
<meta http-equiv="Content-Script-Type" content="text/javascript" />
<meta name="viewport" content="width=device-width, user-scalable=no">
<link href="https://res.khjxiaogu.com/index.css" type="text/css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/velocity/1.2.3/velocity.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@2.6.11"></script>
<script src="https://res.khjxiaogu.com/feather.min.js"></script>
<script src="chat.js"></script>
<style>

.loginBtn{
height:40px;
width:100px;
right:0;
}
input,textarea{
margin: 0;
display:inline-flex;
right:0;
width:100%;
max-width:274px;
position: relative;
border: 1px solid #d1d5da;
background-color: white;
padding-top:7px;
padding-bottom:7px;
padding-left:3px;
padding-right:3px;
}
textarea{
font-size:22px!important;
resize:none;
height:auto;
padding: 0;
margin-right:5px;
}
.userhead{
border-radius:1em 1em 1em 1em;
height: 2em;
width: 2em;
}
p{
font-size:18px!important;
}
.arrowL:before,.arrowL:after{
    right: 100%;
    top: 15px;
    border: solid transparent;
    content: " ";
    height: 0;
    width: 0;
    position: absolute;
    pointer-events: none;
}
.arrowL:before {
    border-color: rgba(0, 0, 0, 0);
    border-right-color: #000000;
    border-width: 11px;
    margin-top: -11px;
}
.arrowL:after {
    border-color: rgba(255, 255, 255, 0);
    border-right-color: #ffffff;
    border-width: 10px;
    margin-top: -10px;
}
.arrowR:after, .arrowR:before {
	left: 100%;
	top: 15px;
	border: solid transparent;
	content: " ";
	height: 0;
	width: 0;
	position: absolute;
	pointer-events: none;
}

.arrowR:after {
	border-color: rgba(255, 255, 255, 0);
	border-left-color: #ffffff;
	border-width: 10px;
	margin-top: -10px;
}
.arrowR:before {
	border-color: rgba(0, 0, 0, 0);
	border-left-color: #000000;
	border-width: 11px;
	margin-top: -11px;
}
</style>
</head>
<body style="background-color: rgb(253, 252, 248);background-repeat: no-repeat;background-size: cover;">
<div class="navigator"><div><a href="/" >
<img class="navigateLogo" src="https://res.khjxiaogu.com/logo.png"></a></div>
<div class="MainTitle"><div>AI修仙模拟器</div></div>
</div>
<div class="body" id="messages" style="overflow-y:scroll">
<transition-group name="message-fade" tag="div" style="position:relative;" :css="false" @before-enter="beforeEnter"  @enter="enter">
<div v-for="(item, index) in computedList" :key="item.msg" :data-index="index" style="display:flex;margin-top:10px;margin-left:auto;margin-right:20px;max-width: 90%;" :align="item.title==user? 'right':'left'">
<img style="height:2em;width:2em" class="userhead" v-if="item.head&& item.title!=user" :src="item.head" onerror="this.src='https://res.khjxiaogu.com/piclib/nohead.png'"></img>
<div :class="{central:!item.title}" style="width:90%">
<span class="InvTitle" v-if="item.title && item.title!=user">{{ item.title }}：</span>
<div class="Box" style="line-height: unset;max-width:100%;width:max-content;margin:0;padding:5px;margin-top:5px">
<div class="central" style="justify-content:left;text-align:left;display:inline"><p style="justify-content:left;margin:0;width:max-content;max-width:100%" v-html="item.msg"></p></div></div></div>
<img style="height:2em;width:2em;margin-left:10px;margin-right:0" class="userhead" v-if="item.head&& item.title==user" :src="item.head" onerror="this.src='https://res.khjxiaogu.com/piclib/nohead.png'"></img></div></transition-group>


</div>
<form id="input" onsubmit="chat.sendMessage(sendmsgbox.value);sendmsgbox.value='';" style="z-index:10;display:none;height:fit-content;bottom:3px;position:fixed;width:100%;max-height:50%;min-height:30px;" action="javascript:;" class="central">
<table style="width:100%"><tr><td style="width:100%;white-space: nowrap;"><div class="central" style="display:inline-flex;">
<textarea name="sendmessage" style="display:inline;width:100%;height:1em;max-width:100%;max-height:100%;" id="sendmsgbox" ></textarea></div></td><td>
<a class="SmplBtn" id="sendmsgsubmit" onclick="delayedResize();chat.sendMessage(sendmsgbox.value);sendmsgbox.value='';" style="height: 29px;width:80px;">发送<i data-feather="send"></i></a></td></tr></table></form>

<div style="position:fixed;left:0px;width:max-content;top:60px;bottom:50px;display:flex">
<div class="Box" style="width:max-content;height:100%;padding:4px;word-break: keep-all;overflow:auto;overflow-y:scroll;display:none" id="chats">
<ul style="list-style: none;padding: initial;">
<li v-for="(val,index) in list"><a @click="changeChat(val.chatid)">{{val.name}}</a></li>
<li><select v-model="selectedApp"><option v-for="(val,index) in applist" :value="val.appid">{{val.name}}</option></select><a @click="createApp()">新建</a></li>
</ul>
</div>
<div class="Box" style="width:max-content;height:100%;padding:4px;word-break: keep-all;overflow:auto;overflow-y:scroll;display:none" id="sets">
<ul style="list-style: none;padding: initial;">
<li>背景:<input type="file" id="cbg" style="width:5em;height:2em;padding:0" onchange="cngbg(event.target.files[0]);"></input>(最大2M)</li>
<li>背景X:<input type="range" min="0" max="100" value="0" onchange="document.body.style['background-position-x']=event.target.value+'%';save();"></input></li>
<li>背景Y:<input type="range" min="0" max="100" value="0" onchange="document.body.style['background-position-y']=event.target.value+'%';save();"></input></li>
<li><button onclick="bgmr();">恢复默认</button></li>
<script>
function cngbg(fn){
readAsDataURL(fn,function(url){
document.body.style["background-image"]="url("+url.target.result+")";
if(storageAvailable("localStorage")){
localStorage.setItem("bgurl","");
localStorage.setItem("bgurl",url.target.result);
}
});
}
function bgmr(){
localStorage.setItem("bgurl",undefined);
document.body.style["background-image"]="";
document.body.style['background-position-x']="";
document.body.style['background-position-y']="";
}
function save(){
	if(storageAvailable("localStorage")){
		localStorage.setItem("bgX",document.body.style['background-position-x']);
		localStorage.setItem("bgY",document.body.style['background-position-y']);
	}
}
function storageAvailable(type) {
    var storage;
    try {
        storage = window[type];
        var x = '__storage_test__';
        storage.setItem(x, x);
        storage.removeItem(x);
        return true;
    }
    catch(e) {
        return e instanceof DOMException && (e.code === 22 ||e.code === 1014 ||e.name === 'QuotaExceededError' ||e.name === 'NS_ERROR_DOM_QUOTA_REACHED') &&
            (storage && storage.length !== 0);
    }
}
if(storageAvailable("localStorage")){
	var bi=localStorage.getItem("bgurl");
	if(bi!=undefined){
		document.body.style["background-image"]="url("+bi+")";
		document.body.style['background-position-x']=localStorage.getItem("bgX");
		document.body.style['background-position-y']=localStorage.getItem("bgY");
	}
}
</script>
</ul>
</div>
<div class="central" style="width:max-content;flew-flow:column">
<ul style="padding:0;margin:0">
<dl>
<a class="SmplBtn" style="height:5em;width:max-content;line-height:1em" onclick="chats.style.display=='none'?chats.style.display='':chats.style.display='none'">
聊<br />
天<br />
列<br />
表<br />
</a>
</dl>
<dl>
<a class="SmplBtn" style="height:5em;width:max-content;line-height:1em" onclick="sets.style.display=='none'?sets.style.display='':sets.style.display='none'">
聊<br />
天<br />
设<br />
置<br />
</a>
</dl>
</ul>
</div>
</div>
<script>
feather.replace();
sendmsgbox.addEventListener('change',  autoResize);
sendmsgbox.addEventListener( 'cut',    autoResize);
sendmsgbox.addEventListener( 'paste',  autoResize);
sendmsgbox.addEventListener( 'drop',   autoResize);
sendmsgbox.addEventListener('keydown', sendAttmpt);
var waiting=0;

function delayedResize(){
if(waiting)return;
waiting=1;
setTimeout(autoResize,10);
}
function autoResize(){
if(messages.scrollTop+messages.offsetHeight>=messages.scrollHeight-10)
	setTimeout(autoScroll,10);
waiting=0;
sendmsgbox.style.height="0";
sendmsgbox.style.height=sendmsgbox.scrollHeight+'px';
messages.style.bottom=input.offsetHeight+6+'px';
sendmsgbox.style.maxHeight=input.offsetHeight+3+'px';

}
setInterval(autoResize,100);
function sendAttmpt(e)
{

var currKey=0,e=e?e:event;
currKey=e.keyCode||e.which||e.charCode;
delayedResize();
if(currKey==13){
if(e.ctrlKey){
	sendmsgbox.value+="\n";
}else{
	sendmsgsubmit.click();
	e.preventDefault();
	e.stopPropagation();
}
autoResize();
}

}
var emoticons;
var emotemap;

function loadJSON(url,done){
var Httpreq = new XMLHttpRequest(); // a new request
Httpreq.open("GET",url);
Httpreq.send(null);
Httpreq.onloadend=function(){done(Httpreq.responseText);};          
}
delayedResize();
//setInterval(function(){translateEmoticon(document);},10);
var chat=new ChatClient("/aichat");
</script>
</body>
</html>
